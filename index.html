<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- VERY IMPORTANT -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>FruitKart</title>

<style>

/* BASE */
html, body{
    height:100%;
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

/* HEADER */
.header{
    background:linear-gradient(45deg,#ff5722,#ff8a50);
    color:white;
    padding:15px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

/* SCREEN FULL HEIGHT */
.screen{
    display:none;
    min-height:calc(100vh - 120px);
    padding-bottom:90px;
}

/* CARD FULL WIDTH */
.card{
    background:white;
    margin:10px;
    padding:12px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* TABLE SCROLL */
.table-wrap{
    overflow-x:auto;
}

/* TABLE */
table{
    width:100%;
    min-width:400px;
    border-collapse:collapse;
    font-size:14px;
}

th{
    background:#ff5722;
    color:white;
}

th,td{
    padding:8px;
    text-align:center;
    border:1px solid #ddd;
}

/* INPUT */
input{
    padding:8px;
    width:65px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* BUTTON */
button{
    padding:12px;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

/* MODE BUTTONS */
.mode-btn{
    background:#eee;
    margin:3px;
}

.mode-btn.active{
    background:#ff5722;
    color:white;
}

/* BIG BUTTON */
.big-btn{
    width:100%;
    background:#ff5722;
    color:white;
    margin-top:10px;
}

/* FLOAT BUTTON */
.fab{
    position:fixed;
    bottom:90px;
    right:20px;
    width:55px;
    height:55px;
    border-radius:50%;
    font-size:26px;
    background:#ff5722;
    color:white;
}

/* STICKY BUTTON */
.sticky-btn{
    position:fixed;
    bottom:60px;
    width:100%;
    left:0;
    background:white;
    padding:10px;
    box-shadow:0 -2px 6px rgba(0,0,0,0.1);
}

/* NAV */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:white;
    border-top:1px solid #ddd;
}

.nav button{
    flex:1;
    background:none;
    padding:10px;
    color:#777;
}

.nav button.active{
    color:#ff5722;
    font-weight:bold;
}

/* POPUP */
#confirmBox{
    display:none;
    position:fixed;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.popup{
    background:white;
    width:280px;
    padding:20px;
    border-radius:12px;
    margin:150px auto;
    text-align:center;
}

/* BILL */
.bill table{
    min-width:100%;
}

</style>
</head>

<body>

<div class="header">🍎 FruitKart</div>

<!-- SETUP -->
<div id="setupScreen" class="screen">
<div class="card">
<h3>Setup Fruits</h3>

<div class="table-wrap">
<table id="fruitTable"></table>
</div>

<button class="big-btn" onclick="saveData()">Save</button>
</div>

<button class="fab" onclick="addRow()">+</button>
</div>

<!-- BILLING -->
<div id="billingScreen" class="screen">
<div class="card">

<h3>Billing</h3>

<div>
<button class="mode-btn" onclick="setMode('kg',this)">Weight</button>
<button class="mode-btn" onclick="setMode('gram',this)">Gram</button>
<button class="mode-btn" onclick="setMode('money',this)">Budget</button>
</div>

<div class="table-wrap">
<table>
<tr>
<th>Fruit</th>
<th>₹</th>
<th id="modeHead">Weight</th>
<th id="kgHead">Kg</th>
<th id="gHead">Gram</th>
</tr>
<tbody id="billingTable"></tbody>
</table>
</div>

</div>

<!-- sticky button -->
<div class="sticky-btn">
<button class="big-btn" onclick="calculate()">Generate Bill</button>
</div>

</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">
<div class="card bill" id="billBox"></div>
<button class="big-btn" onclick="goTab('billingScreen',navBtns[1])">Back</button>
</div>

<!-- HISTORY -->
<div id="historyScreen" class="screen">
<div class="card">
<h3>History</h3>

<button class="big-btn" style="background:red;" onclick="deleteAllBills()">Delete All</button>

<div id="historyList"></div>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="goTab('setupScreen',this)">Setup</button>
<button onclick="goTab('billingScreen',this)">Billing</button>
<button onclick="goTab('historyScreen',this)">History</button>
</div>

<!-- POPUP -->
<div id="confirmBox">
<div class="popup">
<h3>Delete All Bills?</h3>
<button onclick="confirmDelete()" style="background:red;color:white;">Yes</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>

let mode="kg";
let navBtns=document.querySelectorAll(".nav button");

/* START */
window.onload=function(){
loadSetup();
goTab('billingScreen',navBtns[1]);
}

/* NAV */
function goTab(id,btn){
document.querySelectorAll('.screen').forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";

navBtns.forEach(b=>b.classList.remove("active"));
if(btn) btn.classList.add("active");

if(id==="billingScreen")renderTable();
if(id==="historyScreen")showAllBills();
if(id==="setupScreen")loadSetup();
}

/* SETUP */
function loadSetup(){
let table=document.getElementById("fruitTable");
table.innerHTML="<tr><th>Name</th><th>Price</th></tr>";

let fruits=JSON.parse(localStorage.getItem("fruits")||"[]");

if(fruits.length===0){addRow();}
else{
fruits.forEach(f=>{
let row=table.insertRow();
row.innerHTML=`<td><input class="fname" value="${f.name}"></td>
<td><input type="number" class="fprice" value="${f.price}"></td>`;
});
}
}

function addRow(){
let row=document.getElementById("fruitTable").insertRow();
row.innerHTML='<td><input class="fname"></td><td><input type="number" class="fprice"></td>';
}

function saveData(){
let names=document.getElementsByClassName("fname");
let prices=document.getElementsByClassName("fprice");

let fruits=[];
for(let i=0;i<names.length;i++){
if(names[i].value && prices[i].value){
fruits.push({name:names[i].value,price:Number(prices[i].value)});
}
}

localStorage.setItem("fruits",JSON.stringify(fruits));
}

/* BILLING */
function renderTable(){
let fruits=JSON.parse(localStorage.getItem("fruits")||"[]");
let table=document.getElementById("billingTable");
table.innerHTML="";

fruits.forEach(f=>{
let row=table.insertRow();
row.innerHTML=`
<td>${f.name}</td>
<td>${f.price}</td>
<td><input type="number"></td>
<td></td>
<td></td>
`;
});
}

function setMode(m,btn){
mode=m;
modeHead.innerText = m==="kg"?"Weight":m==="gram"?"Gram":"Budget";

document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

/* BILL */
function calculate(){
let fruits=JSON.parse(localStorage.getItem("fruits"));
let inputs=document.querySelectorAll("#billingTable input");

let total=0;
let rows="";

for(let i=0;i<fruits.length;i++){
let val=Number(inputs[i].value)||0;
let price=fruits[i].price;

let qty = mode==="kg"?val:mode==="gram"?val/1000:val/price;
let cost = mode==="money"?val:qty*price;

if(cost>0){
rows+=`<tr>
<td>${fruits[i].name}</td>
<td>${qty.toFixed(2)}</td>
<td>₹${cost.toFixed(2)}</td>
</tr>`;
total+=cost;
}
}

billBox.innerHTML=`
<h3>FRUITKART</h3>
<table>
<tr><th>Fruit</th><th>Qty</th><th>Price</th></tr>
${rows}
</table>
<br><b>Total ₹${total.toFixed(2)}</b>
`;

saveBill(billBox.innerHTML);
goTab("resultScreen");
}

/* HISTORY */
function saveBill(b){
let bills=JSON.parse(localStorage.getItem("bills")||"[]");
bills.push({time:Date.now(),data:b});
localStorage.setItem("bills",JSON.stringify(bills));
}

function showAllBills(){
let bills=JSON.parse(localStorage.getItem("bills")||"[]");
historyList.innerHTML="";
bills.reverse().forEach(b=>{
let div=document.createElement("div");
div.innerHTML=b.data;
historyList.appendChild(div);
});
}

/* POPUP */
function deleteAllBills(){confirmBox.style.display="block";}
function closePopup(){confirmBox.style.display="none";}
function confirmDelete(){
localStorage.removeItem("bills");
closePopup();
showAllBills();
}

</script>

</body>
</html>
